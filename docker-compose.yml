services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docchat
      POSTGRES_PASSWORD: docchat
      POSTGRES_DB: docchat
    ports:
      - "5432:5432"
    volumes:
      - docchat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docchat -d docchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - docchat_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  docchat_pgdata:
  docchat_redis:
